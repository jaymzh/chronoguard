name: "Fail After Enforcer"
description: "Fails or warns when annotated dates expire"
inputs:
  files:
    description: "JSON array of files to scan"
    required: false
    default: "[]"
  glob:
    description: "Glob pattern to match files"
    required: false
    default: ""
  require_issue:
    description: "Require issue reference (issue:123, #123, or URL)"
    required: false
    default: "false"
runs:
  using: "node20"
  main: "dist/index.js"
