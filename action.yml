name: "Chronoguard"
description: "Fails or warns when annotated dates expire"
inputs:
  files:
    description: "JSON array of files to scan"
    required: false
    default: "[]"
  glob:
    description: "Glob pattern to match files"
    required: false
    default: ""
  require_issue:
    description: "Require issue reference (issue:123, #123, or URL)"
    required: false
    default: "false"
  verbose:
    description: "Print verbose debugging messages"
    require: false
    default: "false"
  fail_on_malformed_tags:
    description: "If we believe we saw a tag but don't parse it, fail"
    require: false
    default: "true"

runs:
  using: "node20"
  main: "dist/index.js"
